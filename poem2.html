<h2>❤️ Rhythm </h2>

<div class="poem">
A thought of you evokes arrhythmia,
A glimpse of you, my heart murmurs
A glance from your eyes sparks atrial flutter
That gentle smile makes my heart gallop
A touch of yours skips my beat...
Let me stay in this lucid dream forever.
